<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1B2A4A">
<title>Itinerario — MM Destinos Mágicos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800;900&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rojo:#C8102E; --navy:#1B2A4A; --crema:#FAF7F2;
  --gris:#666; --gris-claro:#e0ddd8; --blanco:#fff;
  --dorado:#C9A84C; --verde:#1a7a40;
}
body{font-family:'Nunito',sans-serif;background:#EDEBE6;color:#111;min-height:100vh}

/* HEADER */
.header{background:var(--navy);padding:0 20px;height:56px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(0,0,0,.3)}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-logo{width:36px;height:36px;border-radius:50%;overflow:hidden;background:#fff;
  display:flex;align-items:center;justify-content:center}
.hdr-logo img{width:100%;height:100%;object-fit:contain}
.hdr-name{font-size:13px;font-weight:800;color:#fff}
.hdr-name span{font-size:10px;font-weight:400;color:rgba(255,255,255,.6);display:block}
.hdr-num{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.5px}

/* HERO */
.hero{background:var(--navy);padding:40px 20px 32px;text-align:center;
  position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;
  width:240px;height:240px;border-radius:50%;background:var(--rojo);opacity:.12}
.hero::after{content:'';position:absolute;bottom:-40px;left:-40px;
  width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero-eyebrow{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  color:var(--rojo);margin-bottom:8px;position:relative;z-index:1}
.hero-dest{font-family:'Playfair Display',serif;font-size:clamp(24px,6vw,40px);
  font-weight:900;color:#fff;line-height:1.1;margin-bottom:8px;position:relative;z-index:1}
.hero-script{font-family:'Dancing Script',cursive;font-size:18px;color:rgba(255,255,255,.7);
  margin-bottom:20px;position:relative;z-index:1}
.hero-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
  position:relative;z-index:1;margin-bottom:24px}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.9);font-size:11px;font-weight:700;
  padding:5px 12px;border-radius:20px}
.hero-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:480px;margin:0 auto;
  position:relative;z-index:1}
.hero-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:8px;padding:10px 14px;text-align:left}
.hero-box-lbl{font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,.5);margin-bottom:3px}
.hero-box-val{font-size:13px;font-weight:700;color:#fff}

/* MAIN */
.main{max-width:640px;margin:0 auto;padding:20px 14px 80px}

/* DÍA CARD */
.dia-card{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:12px;
  box-shadow:0 4px 16px rgba(0,0,0,.08)}
.dia-hd{padding:14px 16px;cursor:pointer;user-select:none;transition:opacity .15s}
.dia-hd:hover{opacity:.9}
.dia-hd-top{display:flex;align-items:center;gap:10px}
.dia-num{background:rgba(255,255,255,.2);color:#fff;font-size:9px;font-weight:800;
  padding:3px 8px;border-radius:12px;flex-shrink:0;letter-spacing:.5px}
.dia-titulo{font-size:13px;font-weight:800;color:#fff;flex:1;line-height:1.3}
.dia-fecha{font-size:10px;color:rgba(255,255,255,.65);margin-top:2px}
.dia-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:12px;
  flex-shrink:0;letter-spacing:.3px;text-transform:uppercase}
.dia-toggle-btn{background:rgba(255,255,255,.15);border:none;cursor:pointer;
  width:26px;height:26px;border-radius:50%;color:#fff;font-size:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .25s}
.dia-card.open .dia-toggle-btn{transform:rotate(180deg)}

/* DÍA BODY */
.dia-body{display:none;border-top:1px solid rgba(0,0,0,.06)}
.dia-card.open .dia-body{display:block}
.agenda{padding:16px}
.franja{display:flex;gap:12px;margin-bottom:14px;padding-bottom:14px;
  border-bottom:1px solid var(--gris-claro)}
.franja:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.franja-ico{font-size:18px;flex-shrink:0;width:28px;text-align:center;padding-top:1px}
.franja-body{}
.franja-lbl{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  color:var(--gris);margin-bottom:3px}
.franja-txt{font-size:12.5px;line-height:1.6;color:#333}
.dia-nota{background:#fffbf0;border-left:3px solid var(--dorado);
  padding:10px 14px;margin:0 16px 16px;border-radius:0 6px 6px 0;
  font-size:11px;color:#666;font-style:italic}

/* TIPO COLORS */
.tipo-llegada{background:#1a6b3c}
.tipo-parque{background:var(--rojo)}
.tipo-descanso{background:#7a5c1e}
.tipo-transicion{background:#2a4a6b}
.tipo-salida{background:var(--navy)}
.tipo-libre{background:#2a6b4a}
.tipo-playa{background:#0369a1}
.tipo-crucero{background:#0f4c6e}

/* RESUMEN */
.resumen{background:var(--navy);border-radius:12px;padding:20px;margin-bottom:16px}
.resumen-title{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  color:var(--rojo);margin-bottom:14px}
.resumen-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.res-item{background:rgba(255,255,255,.07);border-radius:8px;padding:10px 12px;cursor:pointer;
  transition:background .15s}
.res-item:hover{background:rgba(255,255,255,.12)}
.res-num{font-size:10px;font-weight:800;color:rgba(255,255,255,.5);margin-bottom:3px}
.res-titulo{font-size:11px;font-weight:700;color:#fff;line-height:1.3}
.res-fecha{font-size:9px;color:rgba(255,255,255,.45)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat{background:#fff;border-radius:10px;padding:14px;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-num{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--navy)}
.stat-lbl{font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  color:var(--gris);margin-top:2px}

/* FOOTER */
.footer{text-align:center;padding:32px 20px;background:var(--navy);margin-top:0}
.footer-script{font-family:'Dancing Script',cursive;font-size:26px;color:var(--rojo);margin-bottom:4px}
.footer-sub{font-size:8px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.5);margin-bottom:12px}
.footer-contacts{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;
  font-size:11px;color:rgba(255,255,255,.6)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-msg{font-size:15px;font-weight:700;color:var(--gris)}

@media(max-width:480px){
  .hero-info{grid-template-columns:1fr}
  .resumen-grid{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

<script>
var TIPO_LABELS = {
  llegada:'🛬 Llegada', parque:'🎢 Parque', descanso:'😴 Descanso',
  transicion:'🔄 Transición', salida:'🛫 Salida', libre:'🌿 Libre',
  playa:'🏖️ Playa', ciudad:'🏛️ Ciudad', crucero:'🚢 Crucero',
};
var TIPO_COLORS = {
  llegada:'tipo-llegada', parque:'tipo-parque', descanso:'tipo-descanso',
  transicion:'tipo-transicion', salida:'tipo-salida', libre:'tipo-libre',
  playa:'tipo-playa', ciudad:'tipo-parque', crucero:'tipo-crucero',
};
var FRANJAS = [
  { key:'manana',   ico:'🌅', lbl:'Mañana'   },
  { key:'mediodia', ico:'🍽️', lbl:'Mediodía' },
  { key:'tarde',    ico:'☀️', lbl:'Tarde'    },
  { key:'noche',    ico:'🌙', lbl:'Noche'    },
];

function decodeShare(b64){
  try{ return JSON.parse(decodeURIComponent(escape(atob(b64)))); }
  catch(e){ return null; }
}

function render(data){
  // Header
  document.getElementById('hdr-num').textContent = data.numero || '';

  // Hero
  document.getElementById('hero-dest').textContent   = data.destino || 'Tu viaje';
  document.getElementById('hero-nombre').textContent = data.nombre  || 'Viajero';
  document.getElementById('hero-num').textContent    = data.numero  || '';

  // Normalizar días — soporta formato comprimido {d,f,t,ti,p,ag,n} y formato completo
  var dias = (data.dias || []).map(function(d){
    return {
      dia:       d.dia  || d.d  || 0,
      fecha:     d.fecha|| d.f  || '',
      fechaLabel:d.fechaLabel || '',
      tipo:      d.tipo || d.t  || 'libre',
      titulo:    d.titulo|| d.ti || '',
      parque:    d.parque!==undefined ? d.parque : (d.p||null),
      agenda:    d.agenda|| d.ag || {},
      nota:      d.nota  || d.n  || '',
    };
  });
  var nPark  = dias.filter(function(d){ return d.tipo==='parque'; }).length;
  var nDesc  = dias.filter(function(d){ return d.tipo==='descanso'||d.tipo==='libre'; }).length;
  var pax    = parseInt(data.adultos||2) + parseInt(data.menores||0);

  var chipsEl = document.getElementById('hero-chips');
  [dias.length+' días', (dias.length-1)+' noches', pax+' viajero'+(pax!==1?'s':''), nPark+' días de parque']
    .forEach(function(t){ var s=document.createElement('span');s.className='chip';s.textContent=t;chipsEl.appendChild(s); });

  document.getElementById('hero-section').style.display = 'block';
  document.getElementById('footer-section').style.display = 'block';

  var main = document.getElementById('main-content');
  main.innerHTML = '';

  // Stats
  var stats = document.createElement('div');
  stats.className = 'stats';
  [[dias.length,'📅','Días totales'],[nPark,'🎢','En parques'],[nDesc,'😴','Descanso']]
    .forEach(function(s){
      stats.innerHTML += '<div class="stat"><div class="stat-num">'+s[0]+'</div><div class="stat-lbl">'+s[2]+'</div></div>';
    });
  main.appendChild(stats);

  // Resumen
  var res = document.createElement('div');
  res.className = 'resumen';
  res.innerHTML = '<div class="resumen-title">Resumen del itinerario</div><div class="resumen-grid" id="res-grid"></div>';
  main.appendChild(res);
  var resGrid = res.querySelector('#res-grid');
  dias.forEach(function(d, i){
    var item = document.createElement('div');
    item.className = 'res-item';
    item.innerHTML = '<div class="res-num">Día '+d.dia+'</div>'+
      '<div class="res-titulo">'+(d.titulo||'')+'</div>'+
      '<div class="res-fecha">'+(d.fechaLabel||d.fecha||'')+'</div>';
    item.onclick = function(){ scrollToDia(i); };
    resGrid.appendChild(item);
  });

  // Días
  dias.forEach(function(d, i){
    var card = document.createElement('div');
    card.className = 'dia-card';
    card.id = 'dia-'+i;
    var colorClass = TIPO_COLORS[d.tipo] || 'tipo-parque';
    var badgeLbl = TIPO_LABELS[d.tipo] || d.tipo;

    var ag = d.agenda || {};
    var hasAgenda = ag.manana || ag.mediodia || ag.tarde || ag.noche;

    var agendaHTML = '';
    if(hasAgenda){
      agendaHTML = FRANJAS.map(function(fr){
        var txt = ag[fr.key];
        if(!txt) return '';
        return '<div class="franja">'+
          '<div class="franja-ico">'+fr.ico+'</div>'+
          '<div class="franja-body">'+
            '<div class="franja-lbl">'+fr.lbl+'</div>'+
            '<div class="franja-txt">'+txt+'</div>'+
          '</div>'+
        '</div>';
      }).filter(Boolean).join('');
    } else {
      agendaHTML = '<div style="padding:16px;color:#bbb;font-size:12px">Sin agenda cargada</div>';
    }

    card.innerHTML =
      '<div class="dia-hd '+colorClass+'" onclick="toggleCard('+i+')">'+
        '<div class="dia-hd-top">'+
          '<div class="dia-num">DÍA '+d.dia+'</div>'+
          '<div style="flex:1">'+
            '<div class="dia-titulo">'+(d.titulo||'')+'</div>'+
            '<div class="dia-fecha">'+(d.fechaLabel||d.fecha||'')+'</div>'+
          '</div>'+
          '<div class="dia-badge">'+badgeLbl+'</div>'+
          '<button class="dia-toggle-btn" id="btn-'+i+'">▼</button>'+
        '</div>'+
      '</div>'+
      '<div class="dia-body">'+
        '<div class="agenda">'+agendaHTML+'</div>'+
        (d.nota ? '<div class="dia-nota">💡 '+d.nota+'</div>' : '')+
      '</div>';

    main.appendChild(card);
    // Abrir día 1 por defecto
    if(i === 0) toggleCard(0);
  });
}

function toggleCard(i){
  var card = document.getElementById('dia-'+i);
  var btn  = document.getElementById('btn-'+i);
  if(!card) return;
  card.classList.toggle('open');
}

function scrollToDia(i){
  var card = document.getElementById('dia-'+i);
  if(!card) return;
  if(!card.classList.contains('open')) toggleCard(i);
  setTimeout(function(){ card.scrollIntoView({behavior:'smooth',block:'start'}); }, 100);
}

// Init
window.addEventListener('DOMContentLoaded', function(){
  var params = new URLSearchParams(window.location.search);
  var enc    = params.get('share');
  var main   = document.getElementById('main-content');

  if(!enc){
    main.innerHTML = '<div class="empty"><div class="empty-ico">🔗</div>'+
      '<div class="empty-msg">Link inválido o sin datos.</div></div>';
    return;
  }

  var data = decodeShare(enc);
  if(!data || !data.dias || !data.dias.length){
    main.innerHTML = '<div class="empty"><div class="empty-ico">⚠️</div>'+
      '<div class="empty-msg">No se pudo cargar el itinerario.</div></div>';
    return;
  }

  main.innerHTML = '';
  document.title = 'Itinerario ' + (data.destino||'') + ' — MM Destinos Mágicos';
  render(data);
});
</script>
